<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>eHotel Home — Rooms</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .rooms-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:1rem; margin-top:1rem; }
    .room-card { border:1px solid #e5e7eb; padding:1rem; border-radius:8px; display:flex; flex-direction:column; gap:0.5rem; }
    .room-card h3 { margin:0; }
    .card-actions { margin-top:auto; display:flex; gap:0.5rem; justify-content:flex-end; }
    .modal { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.5); z-index:50; }
    .modal.active { display:flex; }
    .modal-body { background:white; padding:1rem; border-radius:8px; width:90%; max-width:720px; max-height:80vh; overflow:auto; }
    .select-btn { background:#10b981; color:white; border:none; padding:0.5rem 0.75rem; border-radius:6px; cursor:pointer; }
    .close-btn { background:#ef4444; color:white; border:none; padding:0.5rem 0.75rem; border-radius:6px; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <h1>eHotel — Rooms</h1>
    <nav>
      <a href="./index.html" class="page-link">API Frontend</a>
      <a href="./rezervacije.html" class="page-link">Search</a>
      <a href="./bookings.html" class="page-link">Bookings</a>
      <a href="./profile.html" class="page-link">My Profile</a>
    </nav>
  </header>

  <main style="padding:1.5rem; max-width:1100px; margin:0 auto;">
    <section>
      <p>Browse available rooms. Click "Details" to view more information or "Reserve" to create a reservation.</p>
      <div id="rooms-grid" class="rooms-grid"></div>
      <div id="home-message" style="margin-top:1rem;color:#374151;"></div>
    </section>
  </main>

  <div id="room-modal" class="modal" aria-hidden="true">
    <div class="modal-body" role="dialog" aria-modal="true">
      <h2 id="modal-title">Room details</h2>
      <div id="modal-content"></div>
      <div style="display:flex;gap:0.5rem;margin-top:1rem;justify-content:flex-end;">
        <button id="modal-close" class="close-btn">Close</button>
        <button id="modal-reserve" class="select-btn">Reserve</button>
      </div>
    </div>
  </div>

  <script src="./guest-home.js"></script>
</body>
</html>
