<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eHotel Login</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page active">
    <h1>Welcome back</h1>
    <p>Sign in to manage your bookings and access your dashboard.</p>
    <form id="login-form">
      <label>
        Email
        <input type="email" name="email" placeholder="you@example.com" required />
      </label>
      <label>
        Password
        <input type="password" name="password" placeholder="Enter your password" required />
      </label>
      <button type="submit">Log in</button>
    </form>
    <div class="auth-footer">
      <p>New here? <a href="./register.html">Create an account</a></p>
      <p><a href="./index.html" class="page-link">Return to landing</a></p>
    </div>
    <pre id="output-login" class="output"></pre>
  </main>

  <script src="./login.js"></script>
</html>
