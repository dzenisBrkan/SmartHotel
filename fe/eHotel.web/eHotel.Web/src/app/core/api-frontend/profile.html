<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>User Profile</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    form { max-width:720px; margin:1.5rem auto; display:flex; flex-direction:column; gap:0.75rem; }
    .row { display:flex; gap:0.5rem; }
    .row > * { flex:1; }
    .save-btn { background:#2563eb; color:white; border:none; padding:0.7rem 1rem; border-radius:6px; cursor:pointer; }
    .logout-btn { background:#ef4444; color:white; border:none; padding:0.5rem 0.8rem; border-radius:6px; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <h1>Profile</h1>
    <nav>
      <a href="./index.html" class="page-link">API Frontend</a>
      <a href="./guest-home.html" class="page-link">Home</a>
    </nav>
  </header>

  <main>
    <section>
      <form id="profile-form">
        <label>Full name<input id="name" name="name" type="text" required /></label>
        <label>Email<input id="email" name="email" type="email" required /></label>
        <label>Phone<input id="phone" name="phone" type="text" /></label>
        <label>New password<input id="password" name="password" type="password" /></label>

        <div style="display:flex;gap:0.5rem; justify-content:flex-end;">
          <button type="button" id="logout-btn" class="logout-btn">Logout</button>
          <button type="submit" class="save-btn">Save Profile</button>
        </div>
      </form>

      <pre id="profile-output" class="output" style="max-width:720px; margin:1rem auto;"></pre>
    </section>
  </main>

  <script src="./profile.js"></script>
</body>
</html>
