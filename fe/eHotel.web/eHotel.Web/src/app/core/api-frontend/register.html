<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eHotel Registration</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page active">
    <h1>Create account</h1>
    <p>Register to book rooms faster and manage reservations from your dashboard.</p>
    <form id="register-form">
      <label>
        Email
        <input type="email" name="email" placeholder="you@example.com" required />
      </label>
      <label>
        Password
        <input type="password" name="password" placeholder="Choose a strong password" required />
      </label>
      <button type="submit">Create account</button>
    </form>
    <div class="auth-footer">
      <p>Already registered? <a href="./login.html">Log in</a></p>
      <p><a href="./index.html" class="page-link">Return to landing</a></p>
    </div>
    <pre id="output-register" class="output"></pre>
  </main>

  <script src="./register.js"></script>
</body>
</html>
