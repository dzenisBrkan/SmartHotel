<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>eHotel Rezervacije</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .search-row { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .room-card { border:1px solid #e5e7eb; padding:1rem; border-radius:8px; margin-bottom:0.75rem; display:flex; justify-content:space-between; align-items:center; gap:1rem; }
    .room-info { flex:1; }
    .modal { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.5); z-index:50; }
    .modal.active { display:flex; }
    .modal-body { background:white; padding:1rem; border-radius:8px; width:90%; max-width:720px; max-height:80vh; overflow:auto; }
    .close-btn { background:#ef4444; color:white; border:none; padding:0.5rem 0.75rem; border-radius:6px; cursor:pointer; }
    .select-btn { background:#10b981; color:white; border:none; padding:0.5rem 0.75rem; border-radius:6px; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <h1>Search & Select Room</h1>
    <nav>
      <a href="./index.html" class="page-link">Back</a>
    </nav>
  </header>

  <main style="padding:1.5rem; max-width:960px; margin:0 auto;">
    <section>
      <div class="search-row">
        <label>
          Check-in
          <input id="checkin" type="date" />
        </label>
        <label>
          Check-out
          <input id="checkout" type="date" />
        </label>
        <label>
          Guests
          <input id="guests" type="number" min="1" value="1" />
        </label>
        <button id="search-btn" style="height:40px;">Search</button>
      </div>
      <div id="search-message" style="margin-bottom:1rem;color:#374151;"></div>
      <div id="rooms-list"></div>
    </section>
  </main>

  <!-- Room details modal -->
  <div id="room-modal" class="modal" aria-hidden="true">
    <div class="modal-body" role="dialog" aria-modal="true">
      <h2 id="modal-title">Room details</h2>
      <div id="modal-content"></div>
      <div style="display:flex;gap:0.5rem;margin-top:1rem;justify-content:flex-end;">
        <button id="modal-close" class="close-btn">Close</button>
        <button id="modal-select" class="select-btn">Select room</button>
      </div>
    </div>
  </div>

  <script src="./rezervacije.js"></script>
</body>
</html>
