<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Room Details</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .detail-grid { display:grid; gap:1rem; max-width:760px; margin:1.5rem auto; }
    .detail-card { border:1px solid #e5e7eb; padding:1rem; border-radius:8px; }
    .actions { display:flex; gap:0.5rem; justify-content:flex-end; margin-top:1rem; }
    .reserve-btn { background:#10b981; color:white; border:none; padding:0.75rem 1rem; border-radius:6px; cursor:pointer; }
    .back-link { text-decoration:none; color:#2563eb; }
  </style>
</head>
<body>
  <header>
    <div class="hero-header">
      <div>
        <h1>Room details</h1>
        <p>Review all information before reserving your stay.</p>
      </div>
      <nav>
        <a href="./index.html" class="page-link">Landing</a>
        <a href="./rezervacije.html" class="page-link">Search</a>
      </nav>
    </div>
  </header>
 
  <main class="detail-grid">
    <div id="room-loading" class="detail-card">Loading room details…</div>
    <div id="room-info" class="detail-card" style="display:none;">
      <h2 id="room-title"></h2>
      <p id="room-description"></p>
      <div class="detail-row">
        <span class="detail-label">Capacity:</span>
        <span id="room-capacity"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Price:</span>
        <span id="room-price"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Extras:</span>
        <span id="room-extras"></span>
      </div>
      <div class="actions">
        <button id="reserve-button" class="reserve-btn">Reserve this room</button>
      </div>
    </div>
    <div id="room-error" class="detail-card" style="display:none;color:#b91c1c;"></div>
  </main>

  <script src="./room-details.js"></script>
</body>
</html>
